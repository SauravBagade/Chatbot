<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | LLaMA Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #20c997, #0d6efd);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .register-title {
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="register-card">
  <h3 class="register-title">🆕 Create Account</h3>

  <!-- Alert -->
  <div id="alertBox"></div>

  <input id="username" class="form-control mb-3" placeholder="Username">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">
  <input id="confirmPassword" type="password" class="form-control mb-3" placeholder="Confirm Password">

  <button onclick="register()" class="btn btn-success w-100">Register</button>

  <p class="text-center mt-3">
    Already have an account? <a href="login.html">Login</a>
  </p>
</div>

<script>
const API = "http://127.0.0.1:8000/auth";

// Show alert
function showAlert(message, type="danger") {
  document.getElementById("alertBox").innerHTML =
    `<div class="alert alert-${type}">${message}</div>`;
}

// Register function
async function register() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  // Validation
  if (!username || !password || !confirmPassword) {
    showAlert("Please fill all fields");
    return;
  }

  if (password.length < 6) {
    showAlert("Password must be at least 6 characters");
    return;
  }

  if (password !== confirmPassword) {
    showAlert("Passwords do not match");
    return;
  }

  try {
    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
      showAlert("Registration successful! Redirecting to login...", "success");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    } else {
      showAlert(data.detail || "Registration failed");
    }

  } catch (err) {
    showAlert("Server error ❌");
  }
}

// Enter key support
document.addEventListener("keypress", function(e) {
  if (e.key === "Enter") register();
});
</script>

</body>
</html>
